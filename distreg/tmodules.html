<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-modules of Distance-Regular Graphs</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; background-color: #f8f9fa; }
        .container { display: flex; gap: 30px; width: 100%; max-width: 1300px; }
        .controls { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .visualization { flex: 2; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; position: relative; height: 700px; }
        select, button { padding: 10px; margin: 10px 0; width: 100%; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { background-color: #c5050c; color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background-color: #9a0409; }
        
        .node { stroke: #fff; stroke-width: 2px; }
        .link { stroke: #999; stroke-opacity: 0.6; }
        .node-label { font-family: monospace; font-size: 13px; font-weight: bold; pointer-events: none; text-anchor: middle; dominant-baseline: central; fill: #222; text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white; }
        
        #math-output { margin-top: auto; padding: 15px; background: #f1f3f5; border-radius: 4px; min-height: 80px; overflow-x: auto;}
        
        .legend-container { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px; }
        .legend-item { display: flex; align-items: center; font-family: monospace; font-size: 14px; background: #f8f9fa; padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd;}
        .legend-color { width: 16px; height: 16px; border-radius: 50%; margin-right: 8px; display: inline-block; }
    </style>
</head>
<body>

    <h1>Irreducible T-modules Visualization</h1>
    
    <div class="container">
        <div class="controls">
            <h3>Configuration</h3>
            <label for="graph-select">Select Graph:</label>
            <select id="graph-select"></select>

            <label for="module-select">Select T-module:</label>
            <select id="module-select"></select>

            <label for="vector-select">Start State (Seed Vector):</label>
            <select id="vector-select"></select>

            <div class="legend-container" id="legend-container"></div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

            <h3>Action</h3>
            <button id="apply-A">Apply A (Sum Neighbors)</button>
            <button id="reset-v" style="background-color: #6c757d;">Reset to Initial State</button>

            <div id="math-output">
                <strong>Module Closure State:</strong> <br>
                <div id="equation-display" style="font-size: 1.1em;">Select a vector to begin.</div>
            </div>
        </div>

        <div class="visualization" id="viz-container"></div>
    </div>

    <script>
        let globalData = {};
        let currentGraph, currentModule, svg, simulation;
        let nodeValues = [];
        let nodes = [];
        let links = [];
        
        // Data for projection and visualization
        let basisVectors = []; // Array of arrays
        let projMatrix; // math.js matrix for calculating coefficients
        
        // Use a standard D3 categorical color scale
        const colors = d3.schemeCategory10;

        d3.json("t_modules.json").then(data => {
            globalData = data;
            populateDropdown("graph-select", Object.keys(data));
            document.getElementById("graph-select").addEventListener("change", updateGraphOptions);
            document.getElementById("module-select").addEventListener("change", updateVectorOptions);
            document.getElementById("vector-select").addEventListener("change", renderGraph);
            document.getElementById("apply-A").addEventListener("click", applyAdjacencyAction);
            document.getElementById("reset-v").addEventListener("click", renderGraph);
            
            updateGraphOptions();
        });

        function populateDropdown(id, options) {
            const select = document.getElementById(id);
            select.innerHTML = "";
            options.forEach(opt => {
                let el = document.createElement("option");
                el.value = opt;
                el.textContent = opt;
                select.appendChild(el);
            });
        }

        function updateGraphOptions() {
            currentGraph = document.getElementById("graph-select").value;
            populateDropdown("module-select", Object.keys(globalData[currentGraph].modules));
            updateVectorOptions();
        }

        function updateVectorOptions() {
            currentModule = document.getElementById("module-select").value;
            const basisDict = globalData[currentGraph].modules[currentModule].basis;
            populateDropdown("vector-select", Object.keys(basisDict));
            renderGraph();
        }

        function renderGraph() {
            const width = document.getElementById("viz-container").clientWidth;
            const height = document.getElementById("viz-container").clientHeight;
            
            const startVectorKey = document.getElementById("vector-select").value;
            const basisDict = globalData[currentGraph].modules[currentModule].basis;
            const basisKeys = Object.keys(basisDict);
            basisVectors = Object.values(basisDict);
            
            // 1. Build the Projection Matrix: (V^T V)^-1 V^T
            const V_arr = [];
            for (let i = 0; i < globalData[currentGraph].vertices; i++) {
                let row = [];
                for (let j = 0; j < basisVectors.length; j++) {
                    row.push(basisVectors[j][i]);
                }
                V_arr.push(row);
            }
            
            const V = math.matrix(V_arr);
            const Vt = math.transpose(V);
            const VtV = math.multiply(Vt, V);
            const VtV_inv = math.inv(VtV);
            projMatrix = math.multiply(VtV_inv, Vt);

            // 2. Initialize State
            nodeValues = [...basisDict[startVectorKey]];
            
            // Generate coefficient array for the starting state
            let currentCoeffs = new Array(basisVectors.length).fill(0);
            currentCoeffs[basisKeys.indexOf(startVectorKey)] = 1;

            // 3. Setup Nodes and color them by their dominant basis vector
            nodes = Array.from({length: globalData[currentGraph].vertices}, (_, i) => {
                let maxVal = -1;
                let bestBasis = 0;
                for(let j = 0; j < basisVectors.length; j++) {
                    if (Math.abs(basisVectors[j][i]) > maxVal) {
                        maxVal = Math.abs(basisVectors[j][i]);
                        bestBasis = j;
                    }
                }
                return { id: i, colorIndex: bestBasis };
            });
            
            links = globalData[currentGraph].edges.map(d => Object.assign({}, d));

            // 4. Update Legend
            const legendContainer = document.getElementById("legend-container");
            legendContainer.innerHTML = "";
            basisKeys.forEach((key, index) => {
                const color = colors[index % colors.length];
                legendContainer.innerHTML += `
                    <div class="legend-item">
                        <span class="legend-color" style="background-color: ${color};"></span>
                        v<sub>${index + 1}</sub>
                    </div>`;
            });

            // 5. Draw D3 Graph
            d3.select("#viz-container").selectAll("*").remove();

            svg = d3.select("#viz-container").append("svg")
                .attr("width", width)
                .attr("height", height);

            simulation = d3.forceSimulation(nodes)
                .force("link", d3.forceLink(links).id(d => d.id).distance(80))
                .force("charge", d3.forceManyBody().strength(-250))
                .force("center", d3.forceCenter(width / 2, height / 2));

            const link = svg.append("g").selectAll("line").data(links).join("line").attr("class", "link");

            const node = svg.append("g").selectAll("circle")
                .data(nodes).join("circle")
                .attr("class", "node")
                .attr("r", 22)
                .attr("fill", d => colors[d.colorIndex % colors.length])
                .call(drag(simulation));

            const label = svg.append("g").selectAll("text")
                .data(nodes).join("text")
                .attr("class", "node-label")
                .text(d => parseFloat(nodeValues[d.id].toFixed(2)));

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("cx", d => d.x).attr("cy", d => d.y);
                label.attr("x", d => d.x).attr("y", d => d.y);
            });

            updateMathDisplay(`\\text{State}`, currentCoeffs);
        }

        function applyAdjacencyAction() {
            let nextValues = new Array(nodes.length).fill(0);
            
            links.forEach(l => {
                let sId = l.source.id;
                let tId = l.target.id;
                nextValues[sId] += nodeValues[tId];
                nextValues[tId] += nodeValues[sId];
            });

            nodeValues = nextValues; 

            // Calculate new coefficients: c_new = projMatrix * nextValues
            let nextValuesMat = math.matrix(nextValues);
            let newCoeffsMat = math.multiply(projMatrix, nextValuesMat);
            let newCoeffs = newCoeffsMat.toArray().map(c => Math.abs(c) < 1e-8 ? 0 : c);

            // Animate node scalar labels
            svg.selectAll(".node-label")
                .transition().duration(750)
                .tween("text", function(d) {
                    const i = d3.interpolate(parseFloat(this.textContent), nodeValues[d.id]);
                    return function(t) { this.textContent = parseFloat(i(t).toFixed(2)); };
                });

            updateMathDisplay(`A \\cdot \\text{State}`, newCoeffs);
        }

        function updateMathDisplay(actionText, coeffs) {
            let terms = [];
            for (let j = 0; j < coeffs.length; j++) {
                let val = coeffs[j];
                if (Math.abs(val) > 1e-8) {
                    let colorHex = colors[j % colors.length];
                    // Format appropriately for MathJax color parsing
                    terms.push(`\\color{${colorHex}}{${val.toFixed(2)} \\mathbf{v}_{${j+1}}}`);
                }
            }
            
            if (terms.length === 0) terms.push("0");
            
            const mathEl = document.getElementById("equation-display");
            mathEl.innerHTML = `\\[ ${actionText} = ${terms.join(" + ")} \\]`;
            
            if (window.MathJax) {
                MathJax.typesetPromise([mathEl]);
            }
        }

        function drag(simulation) {
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }
            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }
            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }
            return d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended);
        }
    </script>
</body>
</html>
