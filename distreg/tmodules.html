<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-modules of Distance-Regular Graphs</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; background-color: #f8f9fa; }
        .container { display: flex; gap: 30px; width: 100%; max-width: 1400px; }
        .controls { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; min-width: 350px; }
        .visualization { flex: 2; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; position: relative; height: 800px; overflow: hidden; }
        select, button { padding: 10px; margin: 10px 0; width: 100%; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { background-color: #c5050c; color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background-color: #9a0409; }
        
        .node { stroke: #fff; transition: fill 0.5s ease; }
        .link { stroke: #bbb; stroke-opacity: 0.6; }
        .node-label { font-family: monospace; font-weight: bold; pointer-events: none; text-anchor: middle; dominant-baseline: central; fill: #111; text-shadow: 1px 1px 2px rgba(255,255,255,0.9), -1px -1px 2px rgba(255,255,255,0.9), 1px -1px 2px rgba(255,255,255,0.9), -1px 1px 2px rgba(255,255,255,0.9); }
        
        #math-output { margin-top: auto; padding: 15px; background: #f1f3f5; border-radius: 4px; min-height: 80px; overflow-x: auto;}
        
        .legend-container { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px; }
        .legend-item { display: flex; align-items: center; font-family: monospace; font-size: 14px; background: #f8f9fa; padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd;}
        .legend-color { width: 16px; height: 16px; border-radius: 50%; margin-right: 8px; display: inline-block; }
    </style>
</head>
<body>

    <h1>Irreducible T-modules Visualization</h1>
    
    <div class="container">
        <div class="controls">
            <h3>Configuration</h3>
            <label for="graph-select">Select Graph:</label>
            <select id="graph-select"></select>

            <label for="module-select">Select T-module:</label>
            <select id="module-select"></select>

            <label for="vector-select">Start State (Seed Vector):</label>
            <select id="vector-select"></select>

            <div class="legend-container" id="legend-container"></div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

            <h3>Action</h3>
            <button id="apply-A">Apply A (Sum Neighbors)</button>
            <button id="reset-v" style="background-color: #6c757d;">Reset to Initial State</button>

            <div id="math-output">
                <strong>Current Linear Combination:</strong> <br>
                <div id="equation-display" style="font-size: 1.1em;">Select a vector to begin.</div>
            </div>
        </div>

        <div class="visualization" id="viz-container"></div>
    </div>

    <script>
        let globalData = {};
        let currentGraph, currentModule, svg;
        let nodeValues = [];
        let nodes = [];
        let links = [];
        
        let basisVectors = []; 
        let projMatrix; 
        
        const customColors = ["#007F0E", "#21007F", "#7C6C00", "#FF00DC", "#00C189", "#FF6A00", "#77D1FF", "#d62728", "#9467bd"];
        const ZERO_TOLERANCE = 1e-8;

        d3.json("t_modules.json").then(data => {
            globalData = data;
            populateDropdown("graph-select", Object.keys(data));
            document.getElementById("graph-select").addEventListener("change", updateGraphOptions);
            document.getElementById("module-select").addEventListener("change", updateVectorOptions);
            document.getElementById("vector-select").addEventListener("change", renderGraph);
            document.getElementById("apply-A").addEventListener("click", applyAdjacencyAction);
            document.getElementById("reset-v").addEventListener("click", renderGraph);
            
            updateGraphOptions();
        });

        function populateDropdown(id, options) {
            const select = document.getElementById(id);
            select.innerHTML = "";
            options.forEach(opt => select.appendChild(new Option(opt, opt)));
        }

        function updateGraphOptions() {
            currentGraph = document.getElementById("graph-select").value;
            populateDropdown("module-select", Object.keys(globalData[currentGraph].modules));
            updateVectorOptions();
        }

        function updateVectorOptions() {
            currentModule = document.getElementById("module-select").value;
            const basisDict = globalData[currentGraph].modules[currentModule].basis;
            populateDropdown("vector-select", Object.keys(basisDict));
            renderGraph();
        }

        function getNodeColor(nodeId, val) {
            if (Math.abs(val) < ZERO_TOLERANCE) return "#e9ecef"; 
            return customColors[nodes[nodeId].homeBasis % customColors.length];
        }

        function renderGraph() {
            const startVectorKey = document.getElementById("vector-select").value;
            const basisDict = globalData[currentGraph].modules[currentModule].basis;
            const basisKeys = Object.keys(basisDict);
            basisVectors = Object.values(basisDict);
            
            // Build pseudo-inverse projection matrix (V^T V)^-1 V^T
            const V_arr = [];
            for (let i = 0; i < globalData[currentGraph].vertices; i++) {
                let row = [];
                for (let j = 0; j < basisVectors.length; j++) row.push(basisVectors[j][i]);
                V_arr.push(row);
            }
            const V = math.matrix(V_arr);
            const Vt = math.transpose(V);
            const VtV_inv = math.inv(math.multiply(Vt, V));
            projMatrix = math.multiply(VtV_inv, Vt);

            nodeValues = [...basisDict[startVectorKey]];
            let currentCoeffs = new Array(basisVectors.length).fill(0);
            currentCoeffs[basisKeys.indexOf(startVectorKey)] = 1;

            // Setup Nodes: Map coordinates and find Home Basis
            nodes = globalData[currentGraph].nodes.map((n, i) => {
                let maxVal = -1;
                let bestBasis = 0;
                for(let j = 0; j < basisVectors.length; j++) {
                    if (Math.abs(basisVectors[j][i]) > maxVal) {
                        maxVal = Math.abs(basisVectors[j][i]);
                        bestBasis = j;
                    }
                }
                return { id: i, x: n.x, y: n.y, homeBasis: bestBasis };
            });
            
            links = globalData[currentGraph].edges.map(d => Object.assign({}, d));

            // Update Legend
            const legendContainer = document.getElementById("legend-container");
            legendContainer.innerHTML = "";
            basisKeys.forEach((key, index) => {
                const color = customColors[index % customColors.length];
                legendContainer.innerHTML += `
                    <div class="legend-item">
                        <span class="legend-color" style="background-color: ${color};"></span>
                        v<sub>${index + 1}</sub>
                    </div>`;
            });

            d3.select("#viz-container").selectAll("*").remove();

            // Native viewBox calculation
            const minX = d3.min(nodes, d => d.x) || 0;
            const maxX = d3.max(nodes, d => d.x) || 1;
            const minY = d3.min(nodes, d => d.y) || 0;
            const maxY = d3.max(nodes, d => d.y) || 1;
            
            let dx = maxX - minX;
            let dy = maxY - minY;
            if (dx === 0) dx = 1;
            if (dy === 0) dy = 1;

            // Dynamically scale aesthetics based on coordinate bounds
            const maxDim = Math.max(dx, dy);
            // Smaller radius for denser graphs
            const rBase = (maxDim / Math.sqrt(nodes.length)) * 0.4; 
            
            // 15% Padding to ensure nodes don't get clipped
            const padX = dx * 0.15;
            const padY = dy * 0.15;

            svg = d3.select("#viz-container").append("svg")
                .attr("width", "100%")
                .attr("height", "100%")
                .attr("viewBox", `${minX - padX} ${minY - padY} ${dx + padX * 2} ${dy + padY * 2}`)
                .attr("preserveAspectRatio", "xMidYMid meet");

            svg.append("g").selectAll("line")
                .data(links).join("line")
                .attr("class", "link")
                .attr("stroke-width", rBase * 0.1)
                .attr("x1", d => nodes[d.source].x).attr("y1", d => nodes[d.source].y)
                .attr("x2", d => nodes[d.target].x).attr("y2", d => nodes[d.target].y);

            svg.append("g").selectAll("circle")
                .data(nodes).join("circle")
                .attr("class", "node")
                .attr("id", d => `node-${d.id}`)
                .attr("r", rBase)
                .attr("stroke-width", rBase * 0.1)
                .attr("cx", d => d.x).attr("cy", d => d.y)
                .attr("fill", d => getNodeColor(d.id, nodeValues[d.id]));

            svg.append("g").selectAll("text")
                .data(nodes).join("text")
                .attr("class", "node-label")
                .attr("id", d => `label-${d.id}`)
                .attr("font-size", `${rBase * 0.9}px`)
                .attr("x", d => d.x).attr("y", d => d.y)
                .text(d => Math.abs(nodeValues[d.id]) < ZERO_TOLERANCE ? "" : parseFloat(nodeValues[d.id].toFixed(2)));

            updateMathDisplay(currentCoeffs);
        }

        function applyAdjacencyAction() {
            let nextValues = new Array(nodes.length).fill(0);
            
            links.forEach(l => {
                nextValues[l.source] += nodeValues[l.target];
                nextValues[l.target] += nodeValues[l.source];
            });

            nodeValues = nextValues; 

            // Calculate exact new basis coefficients mapping
            let nextValuesMat = math.matrix(nextValues);
            let newCoeffsMat = math.multiply(projMatrix, nextValuesMat);
            let newCoeffs = newCoeffsMat.toArray().map(c => Math.abs(c) < ZERO_TOLERANCE ? 0 : c);

            nodes.forEach(n => {
                let val = nodeValues[n.id];
                d3.select(`#node-${n.id}`).attr("fill", getNodeColor(n.id, val));
                
                let labelSelect = d3.select(`#label-${n.id}`);
                if (Math.abs(val) < ZERO_TOLERANCE) {
                    labelSelect.text("");
                } else {
                    labelSelect.text(parseFloat(val.toFixed(2)));
                }
            });

            updateMathDisplay(newCoeffs);
        }

        function updateMathDisplay(coeffs) {
            let terms = [];
            for (let j = 0; j < coeffs.length; j++) {
                let val = coeffs[j];
                if (Math.abs(val) > ZERO_TOLERANCE) {
                    let colorHex = customColors[j % customColors.length];
                    terms.push(`\\color{${colorHex}}{${val.toFixed(2)} \\mathbf{v}_{${j+1}}}`);
                }
            }
            
            if (terms.length === 0) terms.push("0");
            
            const mathEl = document.getElementById("equation-display");
            mathEl.innerHTML = `\\[ \\text{State} = ${terms.join(" + ")} \\]`;
            
            if (window.MathJax) MathJax.typesetPromise([mathEl]);
        }
    </script>
</body>
</html>
