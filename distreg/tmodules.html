<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-modules of Distance-Regular Graphs</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; background-color: #f8f9fa; }
        .container { display: flex; gap: 30px; width: 100%; max-width: 1200px; }
        .controls { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .visualization { flex: 2; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; position: relative; height: 600px; }
        select, button { padding: 10px; margin: 10px 0; width: 100%; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { background-color: #c5050c; color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background-color: #9a0409; }
        .node { stroke: #fff; stroke-width: 2px; }
        .link { stroke: #999; stroke-opacity: 0.6; }
        .node-label { font-family: monospace; font-size: 14px; font-weight: bold; pointer-events: none; text-anchor: middle; dominant-baseline: central; }
        #math-output { margin-top: 20px; padding: 15px; background: #f1f3f5; border-radius: 4px; min-height: 50px; }
    </style>
</head>
<body>

    <h1>Irreducible T-modules Visualization</h1>
    
    <div class="container">
        <div class="controls">
            <h3>Configuration</h3>
            <label for="graph-select">Select Graph:</label>
            <select id="graph-select"></select>

            <label for="module-select">Select T-module:</label>
            <select id="module-select"></select>

            <label for="vector-select">Select Basis Vector:</label>
            <select id="vector-select"></select>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

            <h3>Action</h3>
            <p>Applying the adjacency matrix <strong>A</strong> replaces each vertex's value with the sum of its neighbors' values.</p>
            <button id="apply-A">Apply A (Sum Neighbors)</button>
            <button id="reset-v" style="background-color: #6c757d;">Reset to Initial Vector</button>

            <div id="math-output">
                <strong>Current State:</strong> <br>
                <span id="equation-display">Select a vector to begin.</span>
            </div>
        </div>

        <div class="visualization" id="viz-container"></div>
    </div>

    <script>
        let globalData = {};
        let currentGraph, currentModule, currentVector, svg, simulation;
        let nodeValues = [];
        let nodes = [];
        let links = [];

        // Color scale mapping values to a diverging color palette
        const colorScale = d3.scaleLinear().domain([-2, 0, 2]).range(["#1f77b4", "#e9ecef", "#d62728"]).clamp(true);

        // Load JSON data
        d3.json("t_modules.json").then(data => {
            globalData = data;
            populateDropdown("graph-select", Object.keys(data));
            document.getElementById("graph-select").addEventListener("change", updateGraphOptions);
            document.getElementById("module-select").addEventListener("change", updateVectorOptions);
            document.getElementById("vector-select").addEventListener("change", renderGraph);
            document.getElementById("apply-A").addEventListener("click", applyAdjacencyAction);
            document.getElementById("reset-v").addEventListener("click", renderGraph);
            
            updateGraphOptions(); // Initialize
        });

        function populateDropdown(id, options) {
            const select = document.getElementById(id);
            select.innerHTML = "";
            options.forEach(opt => {
                let el = document.createElement("option");
                el.value = opt;
                el.textContent = opt;
                select.appendChild(el);
            });
        }

        function updateGraphOptions() {
            currentGraph = document.getElementById("graph-select").value;
            populateDropdown("module-select", Object.keys(globalData[currentGraph].modules));
            updateVectorOptions();
        }

        function updateVectorOptions() {
            currentModule = document.getElementById("module-select").value;
            const vectors = Object.keys(globalData[currentGraph].modules[currentModule].basis);
            populateDropdown("vector-select", vectors);
            renderGraph();
        }

        function renderGraph() {
            const width = document.getElementById("viz-container").clientWidth;
            const height = document.getElementById("viz-container").clientHeight;
            
            currentVector = document.getElementById("vector-select").value;
            const basisDict = globalData[currentGraph].modules[currentModule].basis;
            nodeValues = [...basisDict[currentVector]]; // Clone the initial vector array

            nodes = Array.from({length: globalData[currentGraph].vertices}, (_, i) => ({id: i}));
            links = globalData[currentGraph].edges.map(d => Object.assign({}, d));

            d3.select("#viz-container").selectAll("*").remove();

            svg = d3.select("#viz-container").append("svg")
                .attr("width", width)
                .attr("height", height);

            simulation = d3.forceSimulation(nodes)
                .force("link", d3.forceLink(links).id(d => d.id).distance(80))
                .force("charge", d3.forceManyBody().strength(-300))
                .force("center", d3.forceCenter(width / 2, height / 2));

            const link = svg.append("g").selectAll("line").data(links).join("line").attr("class", "link");

            const node = svg.append("g").selectAll("circle")
                .data(nodes).join("circle")
                .attr("class", "node")
                .attr("r", 20)
                .attr("fill", d => colorScale(nodeValues[d.id]))
                .call(drag(simulation));

            const label = svg.append("g").selectAll("text")
                .data(nodes).join("text")
                .attr("class", "node-label")
                .text(d => parseFloat(nodeValues[d.id].toFixed(2))); // Display value

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("cx", d => d.x).attr("cy", d => d.y);
                label.attr("x", d => d.x).attr("y", d => d.y);
            });

            updateMathDisplay(`v_{initial}`);
        }

        function applyAdjacencyAction() {
            // Calculate new state: sum of neighbors
            let nextValues = new Array(nodes.length).fill(0);
            
            links.forEach(l => {
                // l.source and l.target are node objects after D3 simulation starts
                let sId = l.source.id;
                let tId = l.target.id;
                nextValues[sId] += nodeValues[tId];
                nextValues[tId] += nodeValues[sId];
            });

            nodeValues = nextValues; // Update state

            // Animate changes
            svg.selectAll(".node")
                .transition().duration(750)
                .attr("fill", d => colorScale(nodeValues[d.id]));

            svg.selectAll(".node-label")
                .transition().duration(750)
                .tween("text", function(d) {
                    const i = d3.interpolate(parseFloat(this.textContent), nodeValues[d.id]);
                    return function(t) { this.textContent = parseFloat(i(t).toFixed(2)); };
                });

            updateMathDisplay(`A \\cdot v`);
        }

        function updateMathDisplay(actionText) {
            const mathEl = document.getElementById("equation-display");
            mathEl.innerHTML = `\\[ ${actionText} \\]`;
            if (window.MathJax) {
                MathJax.typesetPromise([mathEl]);
            }
        }

        // Standard D3 Drag behavior
        function drag(simulation) {
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }
            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }
            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }
            return d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended);
        }
    </script>
</body>
</html>
