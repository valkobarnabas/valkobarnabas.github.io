<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-modules of Distance-Regular Graphs</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        /* Strict single-page layout */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 15px; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; background-color: #f8f9fa; overflow: hidden; }
        h1 { margin: 0 0 15px 0; font-size: 24px; text-align: center; flex: 0 0 auto; }
        
        .container { display: flex; gap: 20px; width: 100%; max-width: 1400px; flex: 1; min-height: 0; }
        
        /* Left Column: Controls */
        .controls { flex: 0 0 320px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow-y: auto; }
        select, button { padding: 10px; margin: 10px 0; width: 100%; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; box-sizing: border-box; }
        button { background-color: #c5050c; color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; margin-top: 15px; }
        button:hover:not(:disabled) { background-color: #9a0409; }
        button:disabled { background-color: #e0e0e0; color: #888; cursor: not-allowed; }
        select:disabled { background-color: #f5f5f5; cursor: not-allowed; }
        
        .legend-container { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .legend-item { display: flex; align-items: center; font-family: monospace; font-size: 13px; background: #f8f9fa; padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd;}
        .legend-color { width: 14px; height: 14px; border-radius: 50%; margin-right: 6px; display: inline-block; }

        /* Right Column: Graph and Math */
        .viz-column { flex: 1; display: flex; flex-direction: column; gap: 15px; min-width: 0; }
        .visualization { flex: 1; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; min-height: 0; overflow: hidden; }
        
        #math-output { flex: 0 0 auto; padding: 15px 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 80px; overflow-x: auto; }
        #equation-display { font-size: 1.1em; margin-top: 10px; width: 100%; text-align: center; }

        /* SVG Elements */
        .node { stroke: #fff; transition: fill 0.4s ease; }
        .link { stroke: #bbb; stroke-opacity: 0.6; }
        /* High contrast text shadow so equations remain readable even if they bleed over links */
        .node-label { font-family: monospace; font-weight: bold; pointer-events: none; text-anchor: middle; dominant-baseline: central; fill: #111; text-shadow: 1px 1px 3px rgba(255,255,255,1), -1px -1px 3px rgba(255,255,255,1), 1px -1px 3px rgba(255,255,255,1), -1px 1px 3px rgba(255,255,255,1); transition: font-size 0.3s ease, fill 0.3s ease; }
    </style>
</head>
<body>

    <h1>Irreducible T-modules Visualization</h1>
    
    <div class="container">
        <div class="controls">
            <h3 style="margin-top: 0;">Configuration</h3>
            <label for="graph-select">Select Graph:</label>
            <select id="graph-select"></select>

            <label for="module-select">Select T-module:</label>
            <select id="module-select"></select>

            <label for="vector-select">Start State (Seed Vector):</label>
            <select id="vector-select"></select>

            <div class="legend-container" id="legend-container"></div>

            <hr style="margin: 25px 0 15px 0; border: 0; border-top: 1px solid #eee;">

            <h3 style="margin-top: 0;">Action</h3>
            <button id="apply-A">Apply A (Sum Neighbors)</button>
            <button id="reset-v" style="background-color: #6c757d;">Reset to Initial State</button>
        </div>

        <div class="viz-column">
            <div class="visualization" id="viz-container"></div>
            
            <div id="math-output">
                <strong>Current Linear Combination</strong>
                <div id="equation-display">Select a vector to begin.</div>
            </div>
        </div>
    </div>

    <script>
        let globalData = {};
        let currentGraph, currentModule, svg;
        let nodeValues = [];
        let nodes = [];
        let links = [];
        
        let basisVectors = []; 
        let projMatrix; 
        
        const customColors = ["#007F0E", "#21007F", "#7C6C00", "#FF00DC", "#00C189", "#FF6A00", "#77D1FF", "#d62728", "#9467bd"];
        const ZERO_TOLERANCE = 1e-8;

        d3.json("t_modules.json").then(data => {
            globalData = data;
            populateDropdown("graph-select", Object.keys(data));
            document.getElementById("graph-select").addEventListener("change", updateGraphOptions);
            document.getElementById("module-select").addEventListener("change", updateVectorOptions);
            document.getElementById("vector-select").addEventListener("change", renderGraph);
            document.getElementById("apply-A").addEventListener("click", applyAdjacencyAction);
            document.getElementById("reset-v").addEventListener("click", renderGraph);
            
            window.addEventListener("resize", () => {
                if(nodes.length > 0) renderGraph();
            });
            
            updateGraphOptions();
        });

        function populateDropdown(id, options) {
            const select = document.getElementById(id);
            select.innerHTML = "";
            options.forEach(opt => select.appendChild(new Option(opt, opt)));
        }

        function updateGraphOptions() {
            currentGraph = document.getElementById("graph-select").value;
            populateDropdown("module-select", Object.keys(globalData[currentGraph].modules));
            updateVectorOptions();
        }

        function updateVectorOptions() {
            currentModule = document.getElementById("module-select").value;
            const basisDict = globalData[currentGraph].modules[currentModule].basis;
            populateDropdown("vector-select", Object.keys(basisDict));
            renderGraph();
        }

        function getNodeColor(nodeId, val) {
            if (Math.abs(val) < ZERO_TOLERANCE) return "#e9ecef"; 
            return customColors[nodes[nodeId].homeBasis % customColors.length];
        }

        function setControlsState(disabled) {
            document.getElementById("graph-select").disabled = disabled;
            document.getElementById("module-select").disabled = disabled;
            document.getElementById("vector-select").disabled = disabled;
            document.getElementById("apply-A").disabled = disabled;
            document.getElementById("reset-v").disabled = disabled;
        }

        function renderGraph() {
            setControlsState(false);
            const startVectorKey = document.getElementById("vector-select").value;
            const basisDict = globalData[currentGraph].modules[currentModule].basis;
            const basisKeys = Object.keys(basisDict);
            basisVectors = Object.values(basisDict);
            
            const V_arr = [];
            for (let i = 0; i < globalData[currentGraph].vertices; i++) {
                let row = [];
                for (let j = 0; j < basisVectors.length; j++) row.push(basisVectors[j][i]);
                V_arr.push(row);
            }
            const V = math.matrix(V_arr);
            const Vt = math.transpose(V);
            const VtV_inv = math.inv(math.multiply(Vt, V));
            projMatrix = math.multiply(VtV_inv, Vt);

            nodeValues = [...basisDict[startVectorKey]];
            let currentCoeffs = new Array(basisVectors.length).fill(0);
            currentCoeffs[basisKeys.indexOf(startVectorKey)] = 1;

            nodes = globalData[currentGraph].nodes.map((n, i) => {
                let maxVal = -1;
                let bestBasis = 0;
                for(let j = 0; j < basisVectors.length; j++) {
                    if (Math.abs(basisVectors[j][i]) > maxVal) {
                        maxVal = Math.abs(basisVectors[j][i]);
                        bestBasis = j;
                    }
                }
                return { id: i, x: n.x, y: n.y, homeBasis: bestBasis };
            });
            
            links = globalData[currentGraph].edges.map(d => Object.assign({}, d));

            const legendContainer = document.getElementById("legend-container");
            legendContainer.innerHTML = "";
            basisKeys.forEach((key, index) => {
                const color = customColors[index % customColors.length];
                legendContainer.innerHTML += `
                    <div class="legend-item">
                        <span class="legend-color" style="background-color: ${color};"></span>
                        v<sub>${index + 1}</sub>
                    </div>`;
            });

            d3.select("#viz-container").selectAll("*").remove();

            const minX = d3.min(nodes, d => d.x) || 0;
            const maxX = d3.max(nodes, d => d.x) || 1;
            const minY = d3.min(nodes, d => d.y) || 0;
            const maxY = d3.max(nodes, d => d.y) || 1;
            
            let dx = maxX - minX;
            let dy = maxY - minY;
            if (dx === 0) dx = 1;
            if (dy === 0) dy = 1;

            const maxDim = Math.max(dx, dy);
            const rBase = (maxDim / Math.sqrt(nodes.length)) * 0.22; 
            
            const padX = dx * 0.25;
            const padY = dy * 0.25;

            svg = d3.select("#viz-container").append("svg")
                .attr("width", "100%")
                .attr("height", "100%")
                .attr("viewBox", `${minX - padX} ${minY - padY} ${dx + padX * 2} ${dy + padY * 2}`)
                .attr("preserveAspectRatio", "xMidYMid meet");

            svg.append("g").selectAll("line")
                .data(links).join("line")
                .attr("class", "link")
                .attr("stroke-width", rBase * 0.08)
                .attr("x1", d => nodes[d.source].x).attr("y1", d => nodes[d.source].y)
                .attr("x2", d => nodes[d.target].x).attr("y2", d => nodes[d.target].y);

            svg.append("g").selectAll("circle")
                .data(nodes).join("circle")
                .attr("class", "node")
                .attr("id", d => `node-${d.id}`)
                .attr("r", rBase)
                .attr("stroke-width", rBase * 0.08)
                .attr("cx", d => d.x).attr("cy", d => d.y)
                .attr("fill", d => getNodeColor(d.id, nodeValues[d.id]));

            svg.append("g").selectAll("text")
                .data(nodes).join("text")
                .attr("class", "node-label")
                .attr("id", d => `label-${d.id}`)
                .attr("font-size", `${rBase * 0.85}px`)
                .attr("x", d => d.x).attr("y", d => d.y)
                .text(d => Math.abs(nodeValues[d.id]) < ZERO_TOLERANCE ? "" : parseFloat(nodeValues[d.id].toFixed(2)));

            updateMathDisplay(currentCoeffs);
        }

        function applyAdjacencyAction() {
            setControlsState(true); 

            let nextValues = new Array(nodes.length).fill(0);
            
            // Track the incoming mathematical blobs for each node so we can display the equation
            let incomingVals = Array.from({length: nodes.length}, () => []);
            
            links.forEach(l => {
                let sId = l.source;
                let tId = l.target;
                let valS = nodeValues[sId];
                let valT = nodeValues[tId];

                nextValues[sId] += valT;
                nextValues[tId] += valS;

                if (Math.abs(valT) >= ZERO_TOLERANCE) incomingVals[sId].push(valT);
                if (Math.abs(valS) >= ZERO_TOLERANCE) incomingVals[tId].push(valS);
            });

            let nextValuesMat = math.matrix(nextValues);
            let newCoeffsMat = math.multiply(projMatrix, nextValuesMat);
            let newCoeffs = newCoeffsMat.toArray().map(c => Math.abs(c) < ZERO_TOLERANCE ? 0 : c);

            const firstNode = svg.select(".node");
            const rBase = firstNode.empty() ? 10 : parseFloat(firstNode.attr("r"));
            const particleR = rBase * 0.55; 
            const particleFontSize = rBase * 0.55; 
            
            const flowG = svg.append("g").attr("class", "flow-layer");
            let activeFlows = 0;
            const flowDuration = 1500;

            links.forEach(l => {
                let s = nodes[l.source];
                let t = nodes[l.target];
                let valS = nodeValues[s.id];
                let valT = nodeValues[t.id];

                // Source to Target Flow
                if (Math.abs(valS) >= ZERO_TOLERANCE) {
                    activeFlows++;
                    let pGroup = flowG.append("g").attr("transform", `translate(${s.x},${s.y})`);

                    pGroup.append("circle")
                        .attr("r", particleR)
                        .attr("fill", getNodeColor(s.id, valS))
                        .attr("stroke", "#fff")
                        .attr("stroke-width", particleR * 0.1);

                    pGroup.append("text")
                        .attr("class", "node-label")
                        .attr("font-size", `${particleFontSize}px`)
                        .text(parseFloat(valS.toFixed(2)));

                    pGroup.transition()
                        .duration(flowDuration)
                        .ease(d3.easeCubicInOut)
                        .attr("transform", `translate(${t.x},${t.y})`)
                        .on("end", () => { activeFlows--; checkEnd(); });
                }
                
                // Target to Source Flow
                if (Math.abs(valT) >= ZERO_TOLERANCE) {
                    activeFlows++;
                    let pGroup = flowG.append("g").attr("transform", `translate(${t.x},${t.y})`);

                    pGroup.append("circle")
                        .attr("r", particleR)
                        .attr("fill", getNodeColor(t.id, valT))
                        .attr("stroke", "#fff")
                        .attr("stroke-width", particleR * 0.1);

                    pGroup.append("text")
                        .attr("class", "node-label")
                        .attr("font-size", `${particleFontSize}px`)
                        .text(parseFloat(valT.toFixed(2)));

                    pGroup.transition()
                        .duration(flowDuration)
                        .ease(d3.easeCubicInOut)
                        .attr("transform", `translate(${s.x},${s.y})`)
                        .on("end", () => { activeFlows--; checkEnd(); });
                }
            });

            if (activeFlows === 0) finalizeUpdate();

            function checkEnd() {
                if (activeFlows === 0) {
                    flowG.transition().duration(200).style("opacity", 0).remove();

                    // Phase 2: Equation Display
                    nodes.forEach(n => {
                        let incoming = incomingVals[n.id];
                        let labelSelect = d3.select(`#label-${n.id}`);
                        
                        if (incoming.length > 0) {
                            let sumStr = "";
                            let sum = 0;
                            
                            // Build the equation string
                            incoming.forEach((val, idx) => {
                                let v = parseFloat(val.toFixed(2));
                                if (idx === 0) sumStr += v;
                                else if (v >= 0) sumStr += " + " + v;
                                else sumStr += " - " + Math.abs(v);
                                sum += v;
                            });
                            
                            // Only append "= X" if there are multiple terms being summed
                            if (incoming.length > 1) {
                                sumStr += " = " + parseFloat(sum.toFixed(2));
                            }
                            
                            labelSelect.text(sumStr)
                                       // Shrink the font size so the equation fits on screen
                                       .attr("font-size", `${rBase * 0.45}px`) 
                                       .attr("fill", "#c5050c"); // Highlight color for the calculation
                        } else {
                            // If a node receives nothing, it calculates to 0. Gray it out temporarily.
                            labelSelect.text("0")
                                       .attr("font-size", `${rBase * 0.85}px`)
                                       .attr("fill", "#999");
                        }
                    });

                    // Phase 3: Hold the equation for 2 seconds, then settle to the final numeric state
                    setTimeout(() => {
                        finalizeUpdate();
                    }, 2000);
                }
            }

            function finalizeUpdate() {
                nodeValues = nextValues; 

                const firstNode = svg.select(".node");
                const rBase = firstNode.empty() ? 10 : parseFloat(firstNode.attr("r"));

                nodes.forEach(n => {
                    let val = nodeValues[n.id];
                    d3.select(`#node-${n.id}`).attr("fill", getNodeColor(n.id, val));
                    
                    let labelSelect = d3.select(`#label-${n.id}`);
                    
                    // Reset the styling from the calculation phase
                    labelSelect.attr("font-size", `${rBase * 0.85}px`).attr("fill", "#111");

                    if (Math.abs(val) < ZERO_TOLERANCE) {
                        labelSelect.text("");
                    } else {
                        labelSelect.text(parseFloat(val.toFixed(2)));
                    }
                });

                updateMathDisplay(newCoeffs);
                setControlsState(false); 
            }
        }

        function updateMathDisplay(coeffs) {
            let terms = [];
            for (let j = 0; j < coeffs.length; j++) {
                let val = coeffs[j];
                if (Math.abs(val) > ZERO_TOLERANCE) {
                    let colorHex = customColors[j % customColors.length];
                    terms.push(`\\color{${colorHex}}{${val.toFixed(2)} \\mathbf{v}_{${j+1}}}`);
                }
            }
            
            if (terms.length === 0) terms.push("0");
            
            const mathEl = document.getElementById("equation-display");
            mathEl.innerHTML = `\\[ = ${terms.join(" + ")} \\]`;
            
            if (window.MathJax) MathJax.typesetPromise([mathEl]);
        }
    </script>
</body>
</html>
