<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutte's 8-Cage — Terwilliger Algebra</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap');

  :root {
    --bg:       #0d0f14;
    --surface:  #141720;
    --border:   #252a36;
    --text:     #c8cdd8;
    --dim:      #5a6070;
    --accent:   #e8c97a;
    --accent2:  #7ab8e8;
    --accent3:  #a87ae8;
    --cell-size: 22px;
    --cell-font: 9px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 32px 24px 60px;
  }

  header {
    max-width: 1100px;
    margin: 0 auto 36px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 28px;
    color: #eaeef7;
    margin-bottom: 4px;
  }
  
  .back-link {
    color: var(--dim);
    text-decoration: none;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--accent2); }

  .main-layout {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: auto 320px;
    gap: 28px;
    align-items: start;
  }

  /* ── Matrix Grid ── */
  .matrix-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
  }

  .matrix-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .matrix-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
  }

  .matrix-container { display: inline-block; }

  .col-labels { display: flex; margin-bottom: 3px; }
  .matrix-row { display: flex; align-items: center; }
  
  .axis-label, .row-label {
    width: var(--cell-size);
    height: var(--cell-size);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7px;
    color: var(--dim);
    flex-shrink: 0;
  }

  .cell {
    width: var(--cell-size);
    height: var(--cell-size);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--cell-font);
    font-weight: 500;
    border-radius: 2px;
    flex-shrink: 0;
    border: 1px solid transparent;
    user-select: none;
    background: rgba(255,255,255,0.02);
    color: #fff;
    transition: filter 0.1s, transform 0.1s;
  }

  .cell:hover {
    border-color: rgba(255,255,255,0.5);
    transform: scale(1.15);
    z-index: 10;
    filter: brightness(1.3);
  }

  .cell.highlighted {
    filter: brightness(1.5);
    border-color: rgba(255,255,255,0.5) !important;
    transform: scale(1.05);
  }
  
  .cell.dimmed { filter: brightness(0.2); }

  /* ── Sidebar ── */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: 800px;
  }

  .info-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    max-height: 100%;
  }

  .info-box h3 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 13px;
    color: #eaeef7;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .word-list {
    overflow-y: auto;
    padding-right: 4px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .word-list::-webkit-scrollbar { width: 4px; }
  .word-list::-webkit-scrollbar-track { background: transparent; }
  .word-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .word-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    text-align: left;
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Mono', monospace;
  }
  .word-btn:hover { background: rgba(255,255,255,0.05); }
  .word-btn.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
  
  .word-idx { 
    font-size: 13px; 
    font-weight: bold;
    width: 20px; 
    font-family: 'Fraunces', serif;
    text-align: center;
  }

  .hover-info {
    font-size: 11px;
    line-height: 1.7;
    color: var(--dim);
    min-height: 80px;
  }
  .hi-label {
    font-size: 26px;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 6px;
  }
  .hi-triple { color: #eaeef7; font-size: 12px; margin-bottom: 4px; }
  
</style>
</head>
<body>

<header>
  <div>
    <h1>Tutte's 8-Cage — <em>T</em>(x)</h1>
    <div style="font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em;">
      Basis Dimension: 49 &nbsp;·&nbsp; Vertices: 30
    </div>
  </div>
  <a href="terwilliger.html" class="back-link">← Back to Index</a>
</header>

<div class="main-layout">
  <div class="matrix-wrap">
    <div class="matrix-header">
      <div class="matrix-title">Full Algebra Basis (Classes A–AW)</div>
    </div>
    <div class="matrix-container" id="matrixContainer"></div>
  </div>

  <div class="side-panel">
    <div class="info-box">
      <h3>Cell Inspector</h3>
      <div class="hover-info" id="hoverInfo">
        <div style="color:var(--dim);font-size:11px;padding-top:8px;">Hover over any cell to inspect its basis class.</div>
      </div>
    </div>
    <div class="info-box" style="flex: 1;">
      <h3>Linear Combinations (dim T = 49)</h3>
      <div class="word-list" id="wordList">
        <div style="text-align: center; color: var(--dim); font-size: 11px; padding: 20px;">Fetching 8cage_classes.json...</div>
      </div>
    </div>
  </div>
</div>

<script>
const N = 30;
let tClasses = [];
const gridCells = [];

// Format e.g., "E_1*AE_2*" into sub/superscripts
function formatComboHTML(comboStr) {
  return comboStr
    .replace(/E_(\d+)\^*/g, "E<sub>$1</sub><sup>*</sup>")
    .replace(/A/g, "A");
}

// Generate 49 distinct colors across hue spectrum
const COLORS = Array.from({length: 49}, (_, i) => {
  const hue = (i * 137.5) % 360; 
  return `hsl(${hue}, 60%, 45%)`;
});

// Map letters A..AW to color indexes
function labelToColorIndex(lbl) {
  if (lbl.length === 1) return lbl.charCodeAt(0) - 65;
  return 26 + (lbl.charCodeAt(1) - 65);
}

// ─── Build DOM Grid ───────────────────────────────────────────────────────────
const mc = document.getElementById('matrixContainer');
const colLabRow = document.createElement('div'); colLabRow.className='col-labels';
const spacer=document.createElement('div'); spacer.className='axis-label'; 
colLabRow.appendChild(spacer);
for(let c=0;c<N;c++){
  const el=document.createElement('div'); el.className='axis-label';
  el.textContent=(c+1); colLabRow.appendChild(el);
}
mc.appendChild(colLabRow);

for(let r=0;r<N;r++){
  const rowEl=document.createElement('div'); rowEl.className='matrix-row';
  const rl=document.createElement('div'); rl.className='row-label'; rl.textContent=r+1;
  rowEl.appendChild(rl);
  
  const rowCells = [];
  for(let c=0;c<N;c++){
    const cell=document.createElement('div');
    cell.className='cell';
    cell.dataset.r = r;
    cell.dataset.c = c;
    
    // Interactions
    cell.addEventListener('mouseenter', () => highlightClass(cell.dataset.lbl));
    cell.addEventListener('mouseleave', clearHighlight);
    
    rowCells.push(cell);
    rowEl.appendChild(cell);
  }
  gridCells.push(rowCells);
  mc.appendChild(rowEl);
}

// ─── Render Functions ─────────────────────────────────────────────────────────
function populateGrid(cellLabels) {
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      const lbl = cellLabels[r][c];
      const cell = gridCells[r][c];
      
      if(lbl === "") {
        cell.style.background = 'transparent';
        continue;
      }
      
      const cIdx = labelToColorIndex(lbl);
      cell.textContent = lbl;
      cell.dataset.lbl = lbl;
      cell.style.backgroundColor = COLORS[cIdx];
    }
  }
}

function buildSidebar(classes) {
  const listEl = document.getElementById('wordList');
  listEl.innerHTML = '';
  
  classes.forEach((cls) => {
    const cIdx = labelToColorIndex(cls.label);
    const color = COLORS[cIdx];
    
    const btn = document.createElement('button');
    btn.className = 'word-btn';
    btn.innerHTML = `
      <span class="word-idx" style="color:${color}">${cls.label}</span>
      <span style="flex:1;">${formatComboHTML(cls.linear_combination)}</span>
    `;
    
    btn.addEventListener('mouseenter', () => highlightClass(cls.label));
    btn.addEventListener('mouseleave', clearHighlight);
    listEl.appendChild(btn);
  });
}

function highlightClass(targetLbl) {
  if (!targetLbl) return;
  const clsData = tClasses.find(c => c.label === targetLbl);
  if (!clsData) return;

  const color = COLORS[labelToColorIndex(targetLbl)];
  
  // Update grid cells
  gridCells.forEach(row => row.forEach(cell => {
    if (cell.dataset.lbl === targetLbl) cell.classList.add('highlighted');
    else cell.classList.add('dimmed');
  }));
  
  // Update info box
  document.getElementById('hoverInfo').innerHTML = `
    <div class="hi-label" style="color:${color}">Class ${clsData.label}</div>
    <div style="font-size: 10px; color: var(--dim); margin-bottom: 2px;">Linear Combination:</div>
    <div class="hi-triple">${formatComboHTML(clsData.linear_combination)}</div>
  `;
}

function clearHighlight() {
  gridCells.forEach(row => row.forEach(cell => {
    cell.classList.remove('highlighted');
    cell.classList.remove('dimmed');
  }));
  
  document.getElementById('hoverInfo').innerHTML = `<div style="color:var(--dim);font-size:11px;padding-top:8px;">Hover over any cell to inspect its basis class.</div>`;
}

// ─── Initialization ───────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  fetch('8cage_classes.json')
    .then(r => r.json())
    .then(data => {
      tClasses = data.classes;
      populateGrid(data.cell_labels);
      buildSidebar(tClasses);
    })
    .catch(err => {
      console.error(err);
      document.getElementById('wordList').innerHTML = `<span style="color: #e87a7a; padding: 10px;">Error loading JSON.</span>`;
    });
});
</script>
</body>
</html>
