<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutte's 8-Cage — Terwilliger Algebra Basis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap');

  :root {
    --bg:       #0d0f14;
    --surface:  #141720;
    --border:   #252a36;
    --text:     #c8cdd8;
    --dim:      #5a6070;
    --accent:   #e8c97a;
    --accent2:  #7ab8e8;
    --accent3:  #a87ae8;
    --cell-size: 22px;
    --cell-font: 9px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 32px 24px 60px;
  }

  header {
    max-width: 1100px;
    margin: 0 auto 36px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 28px;
    color: #eaeef7;
    margin-bottom: 4px;
  }
  
  .back-link {
    color: var(--dim);
    text-decoration: none;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--accent2); }

  .main-layout {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: auto 300px;
    gap: 28px;
    align-items: start;
  }

  /* ── Matrix Grid ── */
  .matrix-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
  }

  .matrix-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .matrix-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
  }

  .matrix-container { display: inline-block; }

  .col-labels { display: flex; padding-left: var(--cell-size); margin-bottom: 3px; }
  .matrix-row { display: flex; align-items: center; }
  
  .axis-label, .row-label {
    width: var(--cell-size);
    height: var(--cell-size);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7px;
    color: var(--dim);
    flex-shrink: 0;
  }

  .cell {
    width: var(--cell-size);
    height: var(--cell-size);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--cell-font);
    font-weight: 500;
    border-radius: 2px;
    flex-shrink: 0;
    border: 1px solid transparent;
    user-select: none;
    background: rgba(255,255,255,0.02);
    color: var(--dim);
    transition: transform 0.1s, background 0.2s;
  }

  .cell:hover {
    border-color: rgba(255,255,255,0.3);
    transform: scale(1.1);
    z-index: 10;
  }

  .cell.val-positive { background: rgba(122, 184, 232, 0.2); color: #fff; }
  .cell.val-high { background: rgba(122, 184, 232, 0.5); color: #fff; font-weight: bold; }
  .cell.val-negative { background: rgba(232, 122, 122, 0.2); color: #fff; }

  /* ── Sidebar ── */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: 800px;
  }

  .info-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    max-height: 100%;
  }

  .info-box h3 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 13px;
    color: #eaeef7;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .word-list {
    overflow-y: auto;
    padding-right: 4px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .word-list::-webkit-scrollbar { width: 4px; }
  .word-list::-webkit-scrollbar-track { background: transparent; }
  .word-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .word-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--dim);
    text-align: left;
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .word-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .word-btn.active { 
    background: rgba(168, 122, 232, 0.15); 
    border-color: var(--accent3); 
    color: #fff; 
  }
  
  .word-idx {
    font-size: 9px;
    color: var(--dim);
    width: 18px;
  }
  
  .current-selection-display {
    font-size: 20px;
    font-family: 'Fraunces', serif;
    color: var(--accent);
    margin-bottom: 10px;
    text-align: center;
    min-height: 30px;
  }

  .loading-msg {
    text-align: center;
    color: var(--dim);
    font-size: 12px;
    padding: 20px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Tutte's 8-Cage — Basis Explorer</h1>
    <div style="font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em;">
      Dimension: 49 &nbsp;·&nbsp; Vertices: 30
    </div>
  </div>
  <a href="terwilliger.html" class="back-link">← Back to Index</a>
</header>

<div class="main-layout">
  <div class="matrix-wrap">
    <div class="matrix-header">
      <div class="matrix-title">Algebraic Basis Matrix View</div>
    </div>
    
    <div class="current-selection-display" id="selectionDisplay">
      <span class="loading-msg">Loading 8cage_words.json...</span>
    </div>
    
    <div class="matrix-container" id="matrixContainer">
      </div>
  </div>

  <div class="side-panel">
    <div class="info-box" style="flex: 1;">
      <h3>Generating Words (dim T)</h3>
      <div class="word-list" id="wordList">
        <div class="loading-msg">Fetching basis...</div>
      </div>
    </div>
  </div>
</div>

<script>
const N = 30;
let basisData = [];

// Initialize empty grid
const mc = document.getElementById('matrixContainer');
const colLabRow = document.createElement('div'); colLabRow.className='col-labels';
const spacer=document.createElement('div'); spacer.style.width='22px'; colLabRow.appendChild(spacer);
for(let c=0;c<N;c++){
  const el=document.createElement('div'); el.className='axis-label';
  el.textContent=(c+1); colLabRow.appendChild(el);
}
mc.appendChild(colLabRow);

const gridCells = [];
for(let r=0;r<N;r++){
  const rowEl=document.createElement('div'); rowEl.className='matrix-row';
  const rl=document.createElement('div'); rl.className='row-label'; rl.textContent=r+1;
  rowEl.appendChild(rl);
  
  const rowCells = [];
  for(let c=0;c<N;c++){
    const cell=document.createElement('div');
    cell.className='cell';
    cell.dataset.r = r;
    cell.dataset.c = c;
    rowCells.push(cell);
    rowEl.appendChild(cell);
  }
  gridCells.push(rowCells);
  mc.appendChild(rowEl);
}

// Formats "E_1*AE_2*" into HTML with sub/superscripts
function formatWordHTML(wordStr) {
  if (wordStr === "I") return "I";
  return wordStr
    .replace(/E_(\d+)\^*/g, "E<sub>$1</sub><sup>*</sup>")
    .replace(/A/g, "A");
}

// Automatically fetch the JSON file on load
document.addEventListener('DOMContentLoaded', () => {
  fetch('8cage_words.json')
    .then(response => {
      if (!response.ok) throw new Error('Network response was not ok');
      return response.json();
    })
    .then(data => {
      basisData = data.basis;
      buildWordList();
      if(basisData.length > 0) {
        renderMatrix(0); // Automatically display the first class
      }
    })
    .catch(error => {
      console.error('Error fetching JSON:', error);
      document.getElementById('selectionDisplay').innerHTML = `<span style="color: #e87a7a; font-size: 14px;">Error: Could not load 8cage_words.json. Ensure the file is in the same directory.</span>`;
      document.getElementById('wordList').innerHTML = '';
    });
});

function buildWordList() {
  const listEl = document.getElementById('wordList');
  listEl.innerHTML = '';
  
  basisData.forEach((item, idx) => {
    const btn = document.createElement('button');
    btn.className = 'word-btn';
    btn.innerHTML = `
      <span class="word-idx">${idx + 1}</span>
      <span style="flex:1;">${formatWordHTML(item.word)}</span>
    `;
    btn.addEventListener('click', () => renderMatrix(idx));
    listEl.appendChild(btn);
  });
}

function renderMatrix(idx) {
  const data = basisData[idx];
  const matrix = data.matrix;
  
  document.getElementById('selectionDisplay').innerHTML = formatWordHTML(data.word);
  
  // Update sidebar active states
  const btns = document.querySelectorAll('.word-btn');
  btns.forEach((b, i) => b.classList.toggle('active', i === idx));
  
  // Render grid
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      const val = matrix[r][c];
      const cell = gridCells[r][c];
      
      // Reset classes
      cell.className = 'cell';
      cell.textContent = '';
      
      if (Math.abs(val) > 1e-7) {
        cell.textContent = val;
        if (val > 1) cell.classList.add('val-high');
        else if (val > 0) cell.classList.add('val-positive');
        else cell.classList.add('val-negative');
      }
    }
  }
}
</script>
</body>
</html>
