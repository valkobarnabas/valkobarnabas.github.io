<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutte's 8-Cage — Terwilliger Algebra Basis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap');

  :root {
    --bg:       #0d0f14;
    --surface:  #141720;
    --border:   #252a36;
    --text:     #c8cdd8;
    --dim:      #5a6070;
    --accent:   #e8c97a;
    --accent2:  #7ab8e8;
    --accent3:  #a87ae8;
    --cell-size: 22px;
    --cell-font: 9px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 32px 24px 60px;
  }

  header {
    max-width: 1100px;
    margin: 0 auto 36px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 28px;
    color: #eaeef7;
    margin-bottom: 4px;
  }
  
  .back-link {
    color: var(--dim);
    text-decoration: none;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--accent2); }

  .main-layout {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: auto 300px;
    gap: 28px;
    align-items: start;
  }

  /* ── Matrix Grid ── */
  .matrix-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
  }

  .matrix-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .matrix-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
  }

  .matrix-container { display: inline-block; }

  .col-labels { display: flex; margin-bottom: 3px; }
  .matrix-row { display: flex; align-items: center; }
  
  .axis-label, .row-label {
    width: var(--cell-size);
    height: var(--cell-size);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7px;
    color: var(--dim);
    flex-shrink: 0;
  }

  .cell {
    width: var(--cell-size);
    height: var(--cell-size);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--cell-font);
    font-weight: 500;
    border-radius: 2px;
    flex-shrink: 0;
    border: 1px solid transparent;
    user-select: none;
    background: rgba(255,255,255,0.02);
    color: var(--dim);
    transition: transform 0.1s, filter 0.1s;
  }

  .cell:hover {
    border-color: rgba(255,255,255,0.5);
    transform: scale(1.15);
    z-index: 10;
    filter: brightness(1.3);
  }
  
  .cell.highlighted {
    filter: brightness(1.5);
    border-color: rgba(255,255,255,0.5) !important;
    transform: scale(1.05);
  }
  .cell.dimmed { filter: brightness(0.3); }

  /* Exact Mode Colors */
  .cell.val-positive { background: rgba(122, 184, 232, 0.2); color: #fff; }
  .cell.val-high { background: rgba(122, 184, 232, 0.5); color: #fff; font-weight: bold; }
  .cell.val-negative { background: rgba(232, 122, 122, 0.2); color: #fff; }

  /* ── Sidebar ── */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: 800px;
  }

  .info-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    max-height: 100%;
  }

  .info-box h3 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 13px;
    color: #eaeef7;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .word-list {
    overflow-y: auto;
    padding-right: 4px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .word-list::-webkit-scrollbar { width: 4px; }
  .word-list::-webkit-scrollbar-track { background: transparent; }
  .word-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .word-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--dim);
    text-align: left;
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .word-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .word-btn.active { 
    background: rgba(168, 122, 232, 0.15); 
    border-color: var(--accent3); 
    color: #fff; 
  }
  
  .word-idx { font-size: 9px; color: var(--dim); width: 18px; }
  
  .current-selection-display {
    font-size: 18px;
    font-family: 'Fraunces', serif;
    color: var(--accent);
    margin-bottom: 10px;
    text-align: center;
    min-height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .btn-reset {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 4px 10px;
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    border-radius: 4px;
    cursor: pointer;
    display: none;
  }
  .btn-reset:hover { background: var(--accent); color: var(--bg); }

  .hover-info {
    font-size: 11px;
    line-height: 1.7;
    color: var(--dim);
    min-height: 80px;
  }
  .hi-label {
    font-size: 22px;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }
  .hi-triple { color: var(--accent2); font-weight: 500; }
  .hi-count { color: var(--accent3); }

</style>
</head>
<body>

<header>
  <div>
    <h1>Tutte's 8-Cage — Basis Explorer</h1>
    <div style="font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em;">
      Dimension: 49 &nbsp;·&nbsp; Vertices: 30
    </div>
  </div>
  <a href="terwilliger.html" class="back-link">← Back to Index</a>
</header>

<div class="main-layout">
  <div class="matrix-wrap">
    <div class="matrix-header">
      <div class="matrix-title">Structure Matrix</div>
    </div>
    
    <div class="current-selection-display" id="selectionDisplay">
      <span id="displayWord">42 Orbit Classes View</span>
      <button class="btn-reset" id="btnResetOrbit">Return to Orbit View</button>
    </div>
    
    <div class="matrix-container" id="matrixContainer"></div>
  </div>

  <div class="side-panel">
    <div class="info-box">
      <h3>Cell Inspector</h3>
      <div class="hover-info" id="hoverInfo">
        <div style="color:var(--dim);font-size:11px;padding-top:8px;">Hover over any cell to inspect its properties.</div>
      </div>
    </div>
    <div class="info-box" style="flex: 1;">
      <h3>Generating Words (dim T)</h3>
      <div class="word-list" id="wordList">
        <div style="text-align: center; color: var(--dim); font-size: 11px; padding: 20px;">Loading JSON...</div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── 1. Graph & BFS Data (For Orbit Classes) ──────────────────────────────────
const N = 30;
const EDGES = [
  [1,2],[1,3],[1,4],[2,5],[2,6],[3,7],[3,8],[4,9],[4,10],
  [5,11],[5,12],[6,13],[6,14],[7,15],[7,16],[8,17],[8,18],
  [9,19],[9,20],[10,21],[10,22],[11,23],[11,24],[12,25],[12,26],
  [13,27],[13,28],[14,29],[14,30],[15,24],[15,27],[16,26],[16,29],
  [17,23],[17,28],[18,25],[18,30],[19,24],[19,30],[20,26],[20,28],
  [21,23],[21,29],[22,25],[22,27]
];

const adj = Array.from({length:N}, ()=>new Array(N).fill(0));
for (const [a,b] of EDGES) { adj[a-1][b-1]=1; adj[b-1][a-1]=1; }

function bfs(src) {
  const dist = new Array(N).fill(-1);
  dist[src]=0; const q=[src];
  while (q.length) {
    const v=q.shift();
    for (let u=0;u<N;u++) if (adj[v][u] && dist[u]===-1) { dist[u]=dist[v]+1; q.push(u); }
  }
  return dist;
}

const distMatrix = Array.from({length:N}, (_,i)=>bfs(i));
const distX = distMatrix[0]; // base vertex 0

const tripleSet = new Map();
const tripleOrder = [];
for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
  const key = `${distX[r]},${distMatrix[r][c]},${distX[c]}`;
  if (!tripleSet.has(key)) { tripleSet.set(key, tripleOrder.length); tripleOrder.push(key); }
}
tripleOrder.sort((a,b)=>{
  const [a0,a1,a2]=a.split(',').map(Number), [b0,b1,b2]=b.split(',').map(Number);
  return a0-b0||a1-b1||a2-b2;
});

const tripleIndex = new Map(tripleOrder.map((t,i)=>[t,i]));
function idxToLabel(i) {
  const L='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if (i<26) return L[i];
  i-=26; return L[Math.floor(i/26)]+L[i%26];
}

const orbitCount = new Array(tripleOrder.length).fill(0);
const labelGrid = Array.from({length:N},()=>new Array(N));
for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
  const idx=tripleIndex.get(`${distX[r]},${distMatrix[r][c]},${distX[c]}`);
  labelGrid[r][c]=idx;
  orbitCount[idx]++;
}

function hsl(h,s,l){ return `hsl(${h},${s}%,${l}%)`; }
const BAND_HUE = [210, 140, 50, 20, 300]; 
const COLORS = tripleOrder.map((t,i)=>{
  const [band,j,k] = t.split(',').map(Number);
  const hue = (BAND_HUE[band] + j*18 + k*5) % 360;
  const sat = 60 + (j%3)*12;
  const lit = 32 + j*7 - band*2;
  return hsl(hue, sat, Math.max(20, Math.min(60, lit)));
});

// ─── 2. Build DOM Grid ─────────────────────────────────────────────────────────
const mc = document.getElementById('matrixContainer');
const colLabRow = document.createElement('div'); colLabRow.className='col-labels';
const spacer=document.createElement('div'); spacer.className='axis-label'; // Fixed column alignment
colLabRow.appendChild(spacer);
for(let c=0;c<N;c++){
  const el=document.createElement('div'); el.className='axis-label';
  el.textContent=(c+1); colLabRow.appendChild(el);
}
mc.appendChild(colLabRow);

const gridCells = [];
for(let r=0;r<N;r++){
  const rowEl=document.createElement('div'); rowEl.className='matrix-row';
  const rl=document.createElement('div'); rl.className='row-label'; rl.textContent=r+1;
  rowEl.appendChild(rl);
  
  const rowCells = [];
  for(let c=0;c<N;c++){
    const idx = labelGrid[r][c];
    const cell=document.createElement('div');
    cell.className='cell';
    cell.dataset.r = r;
    cell.dataset.c = c;
    cell.dataset.idx = idx;
    
    cell.addEventListener('mouseenter', () => highlightClass(idx, r, c));
    cell.addEventListener('mouseleave', clearHighlight);
    
    rowCells.push(cell);
    rowEl.appendChild(cell);
  }
  gridCells.push(rowCells);
  mc.appendChild(rowEl);
}

// ─── 3. Global State & Interaction ─────────────────────────────────────────────
let basisData = [];
let isExactMode = false;
let currentExactIdx = null;

function formatWordHTML(wordStr) {
  if (wordStr === "I") return "I";
  return wordStr.replace(/E_(\d+)\^*/g, "E<sub>$1</sub><sup>*</sup>").replace(/A/g, "A");
}

function renderOrbitClasses() {
  isExactMode = false;
  currentExactIdx = null;
  document.getElementById('displayWord').textContent = "42 Orbit Classes View";
  document.getElementById('btnResetOrbit').style.display = 'none';
  
  document.querySelectorAll('.word-btn').forEach(b => b.classList.remove('active'));

  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      const idx = labelGrid[r][c];
      const cell = gridCells[r][c];
      cell.className = 'cell';
      cell.textContent = idxToLabel(idx);
      cell.style.background = COLORS[idx];
      cell.style.color = '#fff';
    }
  }
}

function renderExactMatrix(idx) {
  isExactMode = true;
  currentExactIdx = idx;
  const data = basisData[idx];
  
  document.getElementById('displayWord').innerHTML = formatWordHTML(data.word);
  document.getElementById('btnResetOrbit').style.display = 'block';
  
  document.querySelectorAll('.word-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      const val = data.matrix[r][c];
      const cell = gridCells[r][c];
      
      cell.className = 'cell';
      cell.style.background = 'transparent';
      cell.textContent = '';
      
      if (Math.abs(val) < 1e-7) {
        cell.classList.add('dimmed');
      } else {
        cell.textContent = Number.isInteger(val) ? val : parseFloat(val.toFixed(2));
        if (val > 1) cell.classList.add('val-high');
        else if (val > 0) cell.classList.add('val-positive');
        else cell.classList.add('val-negative');
      }
    }
  }
}

function highlightClass(idx, r, c) {
  const triple = tripleOrder[idx];
  const [band, j, k] = triple.split(',').map(Number);
  const lbl = idxToLabel(idx);
  
  const hoverEl = document.getElementById('hoverInfo');
  let valStr = '';
  
  if (isExactMode && r !== undefined) {
    const val = basisData[currentExactIdx].matrix[r][c];
    valStr = `<div class="hi-count" style="margin-top: 8px;">Exact Matrix Value: <strong style="font-size:14px;">${Number.isInteger(val) ? val : parseFloat(val.toFixed(2))}</strong></div>`;
  } else {
    // In orbit mode, optionally highlight matching cells
    gridCells.forEach(row => row.forEach(cell => {
      if (parseInt(cell.dataset.idx) === idx) cell.classList.add('highlighted');
    }));
  }

  hoverEl.innerHTML=`
    <div class="hi-label" style="color:${COLORS[idx]}">${lbl}</div>
    <div class="hi-triple" style="color:#eaeef7; font-size: 13px; margin: 4px 0;">
      E<sub>${band}</sub><sup>*</sup> A<sub>${j}</sub> E<sub>${k}</sub><sup>*</sup>
    </div>
    <div style="font-size: 10px; color: var(--dim); margin-bottom: 6px;">Pos (${r+1}, ${c+1})</div>
    <div class="hi-triple">dist(x, row) = ${band}</div>
    <div class="hi-triple">dist(row, col) = ${j}</div>
    <div class="hi-triple">dist(x, col) = ${k}</div>
    <div class="hi-count" style="margin-top: 4px;">${orbitCount[idx]} cells in this class</div>
    ${valStr}
  `;
}

function clearHighlight() {
  if (!isExactMode) {
    document.querySelectorAll('.cell').forEach(cell => cell.classList.remove('highlighted'));
  }
  document.getElementById('hoverInfo').innerHTML = `<div style="color:var(--dim);font-size:11px;padding-top:8px;">Hover over any cell to inspect its properties.</div>`;
}

// ─── 4. JSON Fetching & Initialization ─────────────────────────────────────────
document.getElementById('btnResetOrbit').addEventListener('click', renderOrbitClasses);

document.addEventListener('DOMContentLoaded', () => {
  renderOrbitClasses(); // Show colorful view immediately
  
  fetch('8cage_words.json')
    .then(r => r.json())
    .then(data => {
      basisData = data.basis;
      const listEl = document.getElementById('wordList');
      listEl.innerHTML = '';
      
      basisData.forEach((item, idx) => {
        const btn = document.createElement('button');
        btn.className = 'word-btn';
        btn.innerHTML = `<span class="word-idx">${idx + 1}</span><span style="flex:1;">${formatWordHTML(item.word)}</span>`;
        btn.addEventListener('click', () => renderExactMatrix(idx));
        listEl.appendChild(btn);
      });
    })
    .catch(err => {
      document.getElementById('wordList').innerHTML = `<div style="color: #e87a7a; padding: 10px; font-size: 11px;">Failed to load 8cage_words.json</div>`;
    });
});
</script>
</body>
</html>
