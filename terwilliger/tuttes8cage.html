<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutte's 8-Cage — Terwilliger Algebra</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap');

  :root {
    --bg:       #0d0f14;
    --surface:  #141720;
    --border:   #252a36;
    --text:     #c8cdd8;
    --dim:      #5a6070;
    --accent:   #e8c97a;
    --accent2:  #7ab8e8;
    --accent3:  #a87ae8;
    --cell-size: 22px;
    --cell-font: 9px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 32px 24px 60px;
  }

  header {
    max-width: 1100px;
    margin: 0 auto 36px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 28px;
    color: #eaeef7;
    margin-bottom: 4px;
  }
  
  .back-link {
    color: var(--dim);
    text-decoration: none;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--accent2); }

  .main-layout {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: auto 300px;
    gap: 28px;
    align-items: start;
  }

  /* ── Matrix Grid ── */
  .matrix-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
  }

  .matrix-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .matrix-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
  }

  .matrix-container { display: inline-block; }

  .col-labels { display: flex; margin-bottom: 3px; }
  .matrix-row { display: flex; align-items: center; }
  
  .axis-label, .row-label {
    width: var(--cell-size);
    height: var(--cell-size);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7px;
    color: var(--dim);
    flex-shrink: 0;
  }

  .cell {
    width: var(--cell-size);
    height: var(--cell-size);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--cell-font);
    font-weight: 600;
    border-radius: 2px;
    flex-shrink: 0;
    border: 1px solid transparent;
    user-select: none;
    background: rgba(255,255,255,0.02);
    color: var(--dim);
    transition: transform 0.1s, filter 0.1s;
  }

  .cell:hover {
    border-color: rgba(255,255,255,0.5);
    transform: scale(1.15);
    z-index: 10;
    filter: brightness(1.3);
  }
  
  .cell.dimmed { filter: brightness(0.3); color: transparent; }

  /* ── Sidebar ── */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: 800px;
  }

  .info-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    max-height: 100%;
  }

  .info-box h3 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 13px;
    color: #eaeef7;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .word-list {
    overflow-y: auto;
    padding-right: 4px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .word-list::-webkit-scrollbar { width: 4px; }
  .word-list::-webkit-scrollbar-track { background: transparent; }
  .word-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .word-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--dim);
    text-align: left;
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .word-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .word-btn.active { 
    background: rgba(255,255,255,0.1); 
    border-color: var(--accent); 
    color: #fff; 
  }
  
  .word-idx { 
    font-size: 12px; 
    font-weight: bold;
    width: 22px; 
    font-family: 'Fraunces', serif;
  }
  
  .current-selection-display {
    font-size: 20px;
    font-family: 'Fraunces', serif;
    color: var(--accent);
    margin-bottom: 10px;
    text-align: center;
    min-height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .hover-info {
    font-size: 11px;
    line-height: 1.7;
    color: var(--dim);
    min-height: 80px;
  }
  .hi-label {
    font-size: 28px;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 8px;
  }
  .hi-triple { color: #eaeef7; font-size: 14px; margin-bottom: 4px; }
  .hi-count { color: var(--accent3); font-size: 13px; }

</style>
</head>
<body>

<header>
  <div>
    <h1>Tutte's 8-Cage — <em>T</em>(x)</h1>
    <div style="font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em;">
      Dimension: 49 &nbsp;·&nbsp; Vertices: 30
    </div>
  </div>
  <a href="terwilliger.html" class="back-link">← Back to Index</a>
</header>

<div class="main-layout">
  <div class="matrix-wrap">
    <div class="matrix-header">
      <div class="matrix-title">Terwilliger Basis Matrix View</div>
    </div>
    
    <div class="current-selection-display" id="selectionDisplay">
      <span id="displayWord" style="color: var(--dim); font-size: 14px;">Loading JSON...</span>
    </div>
    
    <div class="matrix-container" id="matrixContainer"></div>
  </div>

  <div class="side-panel">
    <div class="info-box">
      <h3>Cell Inspector</h3>
      <div class="hover-info" id="hoverInfo">
        <div style="color:var(--dim);font-size:11px;padding-top:8px;">Hover over any active cell to view its algebraic properties.</div>
      </div>
    </div>
    <div class="info-box" style="flex: 1;">
      <h3>Basis Dimensions (A–AW)</h3>
      <div class="word-list" id="wordList">
        <div style="text-align: center; color: var(--dim); font-size: 11px; padding: 20px;">Loading 8cage_words.json...</div>
      </div>
    </div>
  </div>
</div>

<script>
const N = 30;
let basisData = [];
let currentExactIdx = 0;

// ─── Utility Functions ────────────────────────────────────────────────────────
function idxToLabel(i) {
  const L = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if (i < 26) return L[i];
  i -= 26; 
  return L[Math.floor(i/26)] + L[i%26];
}

function formatWordHTML(wordStr) {
  if (wordStr === "I") return "I (Identity)";
  return wordStr.replace(/E_(\d+)\^*/g, "E<sub>$1</sub><sup>*</sup>").replace(/A/g, "A");
}

// Generate 49 distinct colors evenly distributed across the hue spectrum
const COLORS = Array.from({length: 50}, (_, i) => {
  const hue = (i * 137.5) % 360; 
  return `hsl(${hue}, 65%, 45%)`;
});

// ─── Build DOM Grid ───────────────────────────────────────────────────────────
const mc = document.getElementById('matrixContainer');
const colLabRow = document.createElement('div'); colLabRow.className='col-labels';
const spacer=document.createElement('div'); spacer.className='axis-label'; 
colLabRow.appendChild(spacer);
for(let c=0;c<N;c++){
  const el=document.createElement('div'); el.className='axis-label';
  el.textContent=(c+1); colLabRow.appendChild(el);
}
mc.appendChild(colLabRow);

const gridCells = [];
for(let r=0;r<N;r++){
  const rowEl=document.createElement('div'); rowEl.className='matrix-row';
  const rl=document.createElement('div'); rl.className='row-label'; rl.textContent=r+1;
  rowEl.appendChild(rl);
  
  const rowCells = [];
  for(let c=0;c<N;c++){
    const cell=document.createElement('div');
    cell.className='cell dimmed';
    cell.dataset.r = r;
    cell.dataset.c = c;
    
    cell.addEventListener('mouseenter', () => highlightCell(r, c));
    cell.addEventListener('mouseleave', clearHighlight);
    
    rowCells.push(cell);
    rowEl.appendChild(cell);
  }
  gridCells.push(rowCells);
  mc.appendChild(rowEl);
}

// ─── Interaction Logic ────────────────────────────────────────────────────────
function renderDimension(idx) {
  currentExactIdx = idx;
  const data = basisData[idx];
  const lbl = idxToLabel(idx);
  const color = COLORS[idx];
  
  document.getElementById('displayWord').innerHTML = `Basis ${lbl}: &nbsp; <span style="color:#eaeef7">${formatWordHTML(data.word)}</span>`;
  
  document.querySelectorAll('.word-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
    if(i === idx) b.style.borderColor = color;
    else b.style.borderColor = 'transparent';
  });
  
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      const val = data.matrix[r][c];
      const cell = gridCells[r][c];
      
      cell.dataset.val = val; // Store exact value for hover info
      
      if (Math.abs(val) < 1e-7) {
        cell.textContent = '';
        cell.className = 'cell dimmed';
        cell.style.backgroundColor = 'rgba(255,255,255,0.02)';
      } else {
        cell.textContent = lbl;
        cell.className = 'cell';
        cell.style.backgroundColor = color;
        cell.style.color = '#fff';
      }
    }
  }
}

function highlightCell(r, c) {
  const cell = gridCells[r][c];
  const val = parseFloat(cell.dataset.val);
  
  if (Math.abs(val) < 1e-7) return; // Ignore zero cells
  
  const lbl = idxToLabel(currentExactIdx);
  const word = formatWordHTML(basisData[currentExactIdx].word);
  const color = COLORS[currentExactIdx];
  
  document.getElementById('hoverInfo').innerHTML = `
    <div class="hi-label" style="color:${color}">Dimension ${lbl}</div>
    <div class="hi-triple">Generator: ${word}</div>
    <div style="font-size: 10px; color: var(--dim); margin-top: 8px;">Matrix Position:</div>
    <div style="font-size: 13px; color: #eaeef7;">Row ${r+1}, Col ${c+1}</div>
    <div class="hi-count" style="margin-top: 12px; padding-top: 8px; border-top: 1px solid var(--border);">
      Exact Value:<br>
      <strong style="font-size:20px;">${Number.isInteger(val) ? val : parseFloat(val.toFixed(2))}</strong>
    </div>
  `;
}

function clearHighlight() {
  document.getElementById('hoverInfo').innerHTML = `<div style="color:var(--dim);font-size:11px;padding-top:8px;">Hover over any active cell to view its algebraic properties.</div>`;
}

// ─── Data Initialization ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  fetch('8cage_words.json')
    .then(r => {
      if (!r.ok) throw new Error("JSON not found");
      return r.json();
    })
    .then(data => {
      basisData = data.basis;
      const listEl = document.getElementById('wordList');
      listEl.innerHTML = '';
      
      basisData.forEach((item, idx) => {
        const lbl = idxToLabel(idx);
        const color = COLORS[idx];
        
        const btn = document.createElement('button');
        btn.className = 'word-btn';
        btn.innerHTML = `<span class="word-idx" style="color:${color}">${lbl}</span><span style="flex:1;">${formatWordHTML(item.word)}</span>`;
        btn.addEventListener('click', () => renderDimension(idx));
        listEl.appendChild(btn);
      });
      
      // Auto-load the first dimension
      if (basisData.length > 0) renderDimension(0);
    })
    .catch(err => {
      document.getElementById('selectionDisplay').innerHTML = `<span style="color: #e87a7a; font-size: 14px;">Error: Could not load 8cage_words.json</span>`;
      document.getElementById('wordList').innerHTML = '';
    });
});
</script>
</body>
</html>
